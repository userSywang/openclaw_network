<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>OpenClaw 初始配置</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f3efe7;
            --panel: #fffdf8;
            --line: #d4c8b2;
            --text: #2a241d;
            --accent: #a64b2a;
            --accent-dark: #7b3118;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", "PingFang SC", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(166, 75, 42, 0.15), transparent 28%),
                linear-gradient(180deg, #faf6ef 0%, var(--bg) 100%);
            color: var(--text);
        }

        .wrap {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(100%, 520px);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 24px 60px rgba(42, 36, 29, 0.12);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
        }

        p {
            margin: 0 0 20px;
            line-height: 1.6;
        }

        form {
            display: grid;
            gap: 14px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            display: grid;
            gap: 6px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: #fff;
            font-size: 15px;
        }

        button {
            border: 0;
            border-radius: 999px;
            padding: 14px 18px;
            background: var(--accent);
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: var(--accent-dark);
        }

        .hint {
            font-size: 13px;
            opacity: 0.75;
        }

        .status {
            min-height: 24px;
            margin-top: 14px;
            font-size: 14px;
        }

        .status.success {
            color: #2f6b2f;
        }

        .status.error {
            color: #9b2c2c;
        }

        .next-step {
            display: none;
            margin-top: 16px;
        }

        .next-step.show {
            display: block;
        }

        .next-step a {
            display: inline-block;
            text-decoration: none;
            border-radius: 999px;
            padding: 12px 18px;
            background: var(--accent);
            color: #fff;
            font-size: 15px;
            font-weight: 700;
        }

        .next-step a:hover {
            background: var(--accent-dark);
        }
    </style>
</head>
<body>
    <div class="wrap">
        <section class="card">
            <h1>OpenClaw 初始配置</h1>
            <p>首次使用时，请输入设备主机名、管理员密码和目标 Wi-Fi 信息。管理员账户固定为 root。</p>

            <form id="setup-form">
                <label>
                    设备主机名
                    <input name="hostname" value="openclaw" maxlength="63" pattern="[a-z0-9-]+" required>
                </label>

                <label>
                    管理员密码 (固定账户 root)
                    <input name="admin_password" type="password" minlength="8" required>
                </label>

                <label>
                    Wi-Fi 名称 (SSID)
                    <input name="ssid" required>
                </label>

                <label>
                    Wi-Fi 密码
                    <input name="wifi_password" type="password">
                </label>

                <button type="submit">开始配置</button>
            </form>

            <p class="hint" id="admin-user">固定管理员账户: root</p>
            <div class="status" id="status"></div>
            <div class="next-step" id="next-step">
                <a href="http://openclaw.local">已连上 Wi-Fi，执行下一步</a>
            </div>
        </section>
    </div>

    <script>
        const statusNode = document.getElementById("status");
        const adminUserNode = document.getElementById("admin-user");
        const nextStepNode = document.getElementById("next-step");
        const form = document.getElementById("setup-form");
        const submitButton = form.querySelector("button");
        let submitFallbackTimer = null;

        function setStatus(message, kind = "", showNextStep = false) {
            statusNode.textContent = message;
            statusNode.className = `status ${kind}`.trim();
            nextStepNode.className = showNextStep ? "next-step show" : "next-step";
        }

        async function loadStatus() {
            try {
                const response = await fetch(`/api/status?t=${Date.now()}`, { cache: "no-store" });
                const data = await response.json();
                adminUserNode.textContent = `固定管理员账户: ${data.admin_user || "root"}`;
                if (data.provisioning_status === "running") {
                    setStatus("配置已提交。设备正在切换到目标 Wi‑Fi；如果你已回到目标网络，请点击下方“执行下一步”。", "success", true);
                    submitButton.disabled = true;
                } else if (data.provisioning_status === "success") {
                    setStatus("配置完成。如果你已经连接到目标 Wi‑Fi，请点击下方“执行下一步”打开 OpenClaw。", "success", true);
                    submitButton.disabled = true;
                } else if (data.provisioning_status === "error" && data.provisioning_message) {
                    setStatus(data.provisioning_message, "error");
                }
            } catch (error) {
                adminUserNode.textContent = "固定管理员账户: root";
            }
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            submitButton.disabled = true;
            setStatus("正在提交配置，请稍候...", "");
            clearTimeout(submitFallbackTimer);
            submitFallbackTimer = setTimeout(() => {
                setStatus("配置已提交。若设备已经连上目标 Wi‑Fi，请点击下方“执行下一步”。", "success", true);
            }, 2500);

            try {
                const response = await fetch("/setup", {
                    method: "POST",
                    body: new FormData(form),
                    cache: "no-store"
                });

                const data = await response.json();
                if (response.ok) {
                    clearTimeout(submitFallbackTimer);
                    setStatus("配置已提交。若设备已连接目标 Wi‑Fi，请点击下方“执行下一步”进入 OpenClaw。", "success", true);
                    form.reset();
                    return;
                }

                clearTimeout(submitFallbackTimer);
                setStatus(data.message || "提交失败，请重试。", "error");
                submitButton.disabled = false;
            } catch (error) {
                clearTimeout(submitFallbackTimer);
                setStatus("请求已发出。如果设备已连接目标 Wi‑Fi，请点击下方“执行下一步”。", "success", true);
            }
        });

        loadStatus();
    </script>
</body>
</html>
